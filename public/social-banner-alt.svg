  </g>
  
  <!-- Title & Content -->
  <text x="250" y="260" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#FFFFFF">Recurb</text>
  
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="32" fill="#E9D5FF" font-weight="300">Track your subscriptions with confidence</text>
  
  <!-- Key features -->

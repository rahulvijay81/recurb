    <path d="M65 25 A40 40 0 1 1 64.96 25" stroke="#E9D5FF" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M65 25 L55 33 L65 37 Z" fill="#E9D5FF"/>
